; =============================================================
; FreeRTOS-Edge-Gateway — PlatformIO Project Configuration
; Author: senapathy
; Board: ESP32 DevKit v1
; Framework: Arduino (with FreeRTOS built-in)
; =============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200     ; Serial baud rate — must match your code
build_flags =
    -DCORE_DEBUG_LEVEL=0   ; Suppress verbose ESP-IDF boot logs